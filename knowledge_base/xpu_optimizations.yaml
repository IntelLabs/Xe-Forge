- applies_to:
  - gemm
  - batched_gemm
  - attention
  - multi_head
  description: Add batch dimension via tl.program_id(axis=1) and per-batch pointer
    offsets
  expected_speedup: enables batched workloads; parallelism scales with B
  id: xpu_batched_gemm_pattern
  name: 'Batched GEMM: use batch dimension on grid axis=1 with int64 offsets'
  notes: '- Grid axis=0 stays 1D (swizzled M*N tiles), axis=1 = batch

    - All swizzle/autotune patterns apply unchanged within each batch

    - Block pointer / descriptor variants work identically — just add batch offset
    to base pointer

    - For attention: heads dimension often maps to the same batch axis

    '
  pattern_after: "# Grid: axis=0 = flattened (M, N) tiles with swizzle, axis=1 = batch\n\
    grid = lambda META: (\n    triton.cdiv(M, META['BLOCK_SIZE_M']) * triton.cdiv(N,\
    \ META['BLOCK_SIZE_N']),\n    B,\n)\n\n@triton.jit\ndef matmul_kernel_batched(\n\
    \        a_ptr, b_ptr, c_ptr,\n        B: tl.constexpr, M: tl.constexpr, N: tl.constexpr,\
    \ K: tl.constexpr,\n        stride_az: tl.constexpr, stride_am: tl.constexpr,\
    \ stride_ak: tl.constexpr,\n        stride_bz: tl.constexpr, stride_bk: tl.constexpr,\
    \ stride_bn: tl.constexpr,\n        stride_cz: tl.constexpr, stride_cm: tl.constexpr,\
    \ stride_cn: tl.constexpr,\n        BLOCK_SIZE_M: tl.constexpr, BLOCK_SIZE_N:\
    \ tl.constexpr,\n        BLOCK_SIZE_K: tl.constexpr, GROUP_SIZE_M: tl.constexpr):\n\
    \    bid = tl.program_id(axis=1)\n    pid = tl.program_id(axis=0)\n\n    # Standard\
    \ tile swizzle on axis=0 (same as non-batched)\n    # ... pid_m, pid_n from GROUP_SIZE_M\
    \ swizzle ...\n\n    # Batch offsets — int64 to prevent overflow\n    offset_a\
    \ = bid.to(tl.int64) * stride_az\n    offset_b = bid.to(tl.int64) * stride_bz\n\
    \    a_ptrs = a_ptr + offset_a + (offs_am[:, None] * stride_am + offs_k[None,\
    \ :] * stride_ak)\n    b_ptrs = b_ptr + offset_b + (offs_k[:, None] * stride_bk\
    \ + offs_bn[None, :] * stride_bn)\n\n    # K-loop, accumulate, store (identical\
    \ to non-batched)\n    # ...\n    offset_c = bid.to(tl.int64) * stride_cz\n  \
    \  c_ptrs = c_ptr + offset_c + stride_cm * offs_cm[:, None] + stride_cn * offs_cn[None,\
    \ :]\n"
  rationale: "Batched GEMM (B x M x K) @ (B x K x N) → (B x M x N) extends the standard\n\
    tiled GEMM by adding a batch grid dimension. The (M, N) tile swizzling stays\n\
    on axis=0; the batch index goes on axis=1. Each batch computes an independent\n\
    GEMM by offsetting all pointers by bid * stride_z.\n\nKey details:\n- Cast bid\
    \ to int64 before multiplying by batch stride to avoid int32 overflow\n  on large\
    \ tensors (see correctness.yaml: int64_cast_for_large_batch_offsets)\n- Tile swizzling\
    \ (GROUP_SIZE_M) works identically within each batch\n- The K-loop, boundary masking,\
    \ and accumulation are unchanged per batch\n"
  stage: xpu_specific
