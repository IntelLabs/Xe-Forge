  id: xpu_warp_size_autotune
  name: Sweep warp_size (sub-group size) alongside num_warps on XPU
  notes: '- warp_size=16 allows up to 64 warps (more parallelism per program)

    - warp_size=32 is standard for GEMM; warp_size=16 often better for reductions

    - Combine with num_warps and grf_mode for full autotune coverage

    '
  pattern_after: "@triton.autotune(\n  configs=[\n    # warp_size=32 variants\n  \
    \  triton.Config({\"warp_size\": 32}, num_warps=32),\n    triton.Config({\"warp_size\"\
    : 32}, num_warps=16),\n    triton.Config({\"warp_size\": 32}, num_warps=8),\n\
    \    triton.Config({\"warp_size\": 32}, num_warps=4),\n    # warp_size=16 variants\
    \ (more warps possible)\n    triton.Config({\"warp_size\": 16}, num_warps=64),\n\
    \    triton.Config({\"warp_size\": 16}, num_warps=32),\n    triton.Config({\"\
    warp_size\": 16}, num_warps=16),\n    triton.Config({\"warp_size\": 16}, num_warps=8),\n\
    \    triton.Config({\"warp_size\": 16}, num_warps=4),\n  ],\n  key=[...],\n)\n"
  rationale: 'Intel XPU supports sub-group (warp) sizes of 16 and 32. The optimal

    choice depends on the kernel''s register pressure, reduction width, and

    memory access pattern. This is a SEPARATE axis from num_warps — both

    should be swept.


    For row-wise kernels (softmax, layernorm) with narrow rows, warp_size=16

    with more warps can outperform warp_size=32 because each sub-group

    covers fewer columns, allowing more rows to run concurrently.


