  id: xpu_adaptive_grid_layout
  name: Adapt grid layout based on problem size for occupancy
  pattern_after: "# Launch-side:\nif n_ctx <= 512:\n    grid = lambda args: (triton.cdiv(n_ctx,\
    \ args['BLOCK_M']), 1, Z * H)\nelse:\n    grid = lambda args: (Z, H, triton.cdiv(n_ctx,\
    \ args['BLOCK_M']))\n\n# Kernel-side:\nif N_CTX <= 512:\n    start_m = tl.program_id(0)\n\
    \    off_hz = tl.program_id(2)\n    off_z = off_hz // H\n    off_h = off_hz %\
    \ H\nelse:\n    off_z = tl.program_id(0)\n    off_h = tl.program_id(1)\n    start_m\
    \ = tl.program_id(2)\n"
  rationale: "For attention or similar kernels, the grid needs batch (Z), head (H),\
    \ and\ntile dimensions. How these map to grid axes affects occupancy:\n\n- Large\
    \ N_CTX (> 512): grid = (Z, H, num_blocks_m)\n  Each batch and head gets its own\
    \ grid dimension for maximum parallelism.\n\n- Small N_CTX (<= 512): grid = (num_blocks_m,\
    \ 1, Z*H)\n  Flatten batch×head into axis=2, put tiles on axis=0. This ensures\
    \ enough\n  total programs even when num_blocks_m is small.\n\nThe kernel must\
    \ decode the program IDs differently based on the layout.\n"
  stage: xpu_specific
- applies_to:
  - attention
  - flash_attention
  - causal
  - backward
  description: BLK_SLICE_FACTOR reduces block size for masked regions to avoid wasted
    compute
  expected_speedup: reduces wasted compute in causal backward pass
  id: xpu_blk_slice_factor_causal
  name: Use smaller blocks for causal-masked (diagonal) tiles
  pattern_after: 'BLOCK_M1, BLOCK_N1 = 32, 128

    BLK_SLICE_FACTOR = 2

    MASK_BLOCK_M1 = BLOCK_M1 // BLK_SLICE_FACTOR  # = 16 for masked tiles


    # Masked (diagonal) pass with smaller blocks:

    num_steps = BLOCK_N1 // MASK_BLOCK_M1

    dk, dv = _attn_bwd_dkdv(..., MASK_BLOCK_M1, BLOCK_N1, ..., MASK=True)


    # Unmasked (full) pass with normal blocks:

    num_steps = (N_CTX - start_m) // BLOCK_M1

    dk, dv = _attn_bwd_dkdv(..., BLOCK_M1, BLOCK_N1, ..., MASK=False)

    '
  rationale: "In causal attention, diagonal tiles (where the causal mask is active)\
    \ have\nmany masked-out elements. Using full-size blocks wastes compute on zeros.\n\
    \nBLK_SLICE_FACTOR divides the block size for masked regions:\n  MASK_BLOCK_M1\
    \ = BLOCK_M1 // BLK_SLICE_FACTOR\n\nThe kernel runs the masked loop with smaller\
    \ blocks, then switches to full\nblocks for the unmasked (fully below-diagonal)\
    \ region.\n"
  stage: xpu_specific
- applies_to:
  - attention
  - flash_attention
  - multi_head
  description: Reshape [Z, H, N_CTX, D] as [Z*H*N_CTX, D] for descriptors, compute
    offsets manually
  expected_speedup: N/A (enables descriptor use for multi-dim tensors)
  id: xpu_flattened_4d_to_2d_descriptors
  name: Flatten 4D tensors to 2D for tensor descriptors with manual batch/head offset
  notes: '- Requires that Q/K/V are contiguous (assert in wrapper)

    - The [HEAD_DIM, 1] strides mean the last dim is always contiguous

    - K/V descriptors use the same flattened shape but may load with .T

    '
  pattern_after: "y_dim = Z * H * N_CTX\ndesc_q = tl.make_tensor_descriptor(\n   \
    \ Q, shape=[y_dim, HEAD_DIM], strides=[HEAD_DIM, 1],\n    block_shape=[BLOCK_M,\
    \ HEAD_DIM])\n\n# Compute offset into the flattened dimension:\noffset_y = off_z\
    \ * (N_CTX * H) + off_h * N_CTX\nqo_offset_y = offset_y + start_m * BLOCK_M\n\n\
    # Load from the correct batch/head/position:\nq = desc_q.load([qo_offset_y, 0])\n"
  rationale: 'Tensor descriptors support 2D shapes. For 4D attention tensors [Z, H,
    N_CTX, D],

    flatten the first three dims into one and use a manual offset to select the

    correct batch/head slice. This works because Q/K/V/O are contiguous with

    stride pattern [H*N_CTX*D, N_CTX*D, D, 1].

    '
  stage: memory_access
- description: grf_mode is a compiler option, not a triton.Config kwarg. Declare it
    as tl.constexpr in the kernel signature. Use "auto" (auto-selects 256-GRF if spill
    > 1000 bytes) or "256" for always-large GRF. 256-GRF requires num_warps <= 32.
  id: grf_mode_both_variants_in_autotune
  name: Declare grf_mode as tl.constexpr in kernel, use auto or 256 value
  pattern_after: "@triton.jit\ndef kernel(..., grf_mode: tl.constexpr = \"auto\"):\
    \  # correct\n    ...\n# Then in autotune configs — do NOT include grf_mode:\n\
    triton.Config({\"BLOCK_M\": 256}, num_warps=32)  # correct"
  pattern_before: 'triton.Config({"BLOCK_M": 256, "grf_mode": "256"}, num_warps=32)  #
    WRONG'
  stage: xpu_specific
- description: 'When M, N, K are divisible by their respective BLOCK sizes, boundary_check
    can be

    omitted from tl.load/tl.store. Encoding this as autotuned constexpr flags

    allows the compiler to eliminate the guard for the common case while retaining

    correctness for arbitrary shapes.

    '
  id: even_m_n_k_constexpr_for_divisible_shapes
  name: Use EVEN_M/N/K constexpr flags to skip boundary_check on divisible shapes
  pattern_after: "EVEN_M: tl.constexpr\nEVEN_K: tl.constexpr\nif EVEN_M and EVEN_K:\n\
    \    a = tl.load(a_bp)\nelse:\n    a = tl.load(a_bp, boundary_check=(0, 1))\n"
  pattern_before: 'a = tl.load(a_bp, boundary_check=(0, 1))  # always pays check overhead

    '
  stage: xpu_specific
- description: 'If the model stores weight as [N, K], transpose and call .contiguous()
    ONCE

    (in __init__ or on first forward) and cache it. Repacking on every forward

    wastes bandwidth and adds latency.

    '
  id: weight_transpose_pack_once
  name: Pre-pack W^T once as [K, N] contiguous; never repack per-forward
  pattern_after: "def __init__(self, ...):\n    self._weight_t = None\ndef _move_params_once(self):\n\
    \    self._weight_t = self.weight.data.t().contiguous()\n    self._moved_params\
    \ = True\ndef forward(self, x):\n    if not self._moved_params:\n        self._move_params_once()\n\
    \    return kernel_function(x, self._weight_t, ...)\n"
  pattern_before: "def forward(self, x):\n    wt = self.weight.t().contiguous()  \
    \ # expensive every call\n    return kernel_function(x, wt, ...)\n"
  stage: xpu_specific
- description: 'When caching packed copies of learnable parameters, check param._version

    to detect in-place updates from optimizer steps and invalidate stale caches.

    '
  id: version_tracked_param_cache
  name: Track weight._version to invalidate cached packed params on optimizer update
  pattern_after: "def _ensure_cache(self):\n    cur_ver = int(self.weight._version)\n\
    \    if (not self._cache_ready) or (self._packed_version != cur_ver):\n      \
    \  self._w_packed = self.weight.data.t().contiguous().to('xpu')\n        self._packed_version\
    \ = cur_ver\n        self._cache_ready = True\n"
  pattern_before: "def _ensure_cache(self):\n    if not self._cache_ready:      #\
    \ never refreshes after optimizer step\n        self._w_packed = self.weight.data.t().contiguous().to('xpu')\n\
    \        self._cache_ready = True\n"
  stage: xpu_specific
- description: 'tl.max_contiguous(offs, BLOCK) tells the compiler the offset array
    is

    contiguous, enabling coalesced memory access for bias/scale 1D loads.

    '
  id: tl_max_contiguous_hint
  name: Use tl.max_contiguous() hint on offset arrays for coalesced 1D loads
  pattern_after: 'tl.max_contiguous(offs_n, BLOCK_N)

    bias_vals = tl.load(b_ptr + offs_n * stride_b, mask=offs_n < N, other=0.0)

    '
  pattern_before: 'bias_vals = tl.load(b_ptr + offs_n * stride_b, mask=offs_n < N,
    other=0.0)

    '
  stage: xpu_specific
- description: 'sigmoid(x) = 1 / (1 + exp(-x))

    Rewrite exp(-x) as exp2(-x * log2(e)) which maps to a faster hardware instruction.

    '
  id: sigmoid_via_exp2_approximation
  name: Compute sigmoid via tl.math.exp2 instead of tl.exp for faster XPU execution
  pattern_after: "@triton.jit\ndef _sigmoid_exp2(x_f32):\n    inv_ln2 = 1.4426950408889634\
    \   # log2(e)\n    e = tl.math.exp2((-x_f32) * inv_ln2)\n    return 1.0 / (1.0\
    \ + e)\n\nacc = _sigmoid_exp2(acc)\n"
  pattern_before: 'sigmoid = 1.0 / (1.0 + tl.exp(-acc))

    '
  stage: xpu_specific
- description: 'GELU tanh formulation: y = 0.5 * x * (1 + tanh(sqrt(2/pi) * (x + 0.044715*x^3)))

    Prefer tl.math.tanh when available (avoids two exp calls).

    '
  id: gelu_tanh_formulation_via_tl_tanh
  name: Use tl.math.tanh for GELU tanh formulation; fall back to exp2 if unavailable
  pattern_after: 'S2_PI = 0.7978845608028654  # sqrt(2/pi)

    z = S2_PI * (x_f + 0.044715 * x_f * x_f * x_f)

    gelu = 0.5 * x_f * (1.0 + tl.math.tanh(z))

    '
  pattern_before: '# slow: two exp calls

    gelu = 0.5 * x * (1.0 + tl.exp(z) - tl.exp(-z)) / (tl.exp(z) + tl.exp(-z))

    '
  stage: xpu_specific