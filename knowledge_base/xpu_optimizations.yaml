  description: Scale QK scores by 1/ln(2) and use tl.math.exp2 instead of tl.exp throughout
    attention
  expected_speedup: significant on XPU (exp2 maps to native hardware)
  id: xpu_exp2_attention_scaling
  name: Use exp2/log2 with RCP_LN2 scaling for attention softmax
  notes: '- Both forward and backward must use consistent base-2 arithmetic

    - The LN2 constant (0.6931471824645996) is used in backward for dQ scaling

    - Pre-scaling K in backward avoids repeated multiplication inside the loop

    '
  pattern_after: '# Forward: scale by 1/ln(2) once, then use exp2 throughout

    qk_scale = sm_scale

    qk_scale *= 1.44269504  # 1/log(2) — converts to base-2


    # In the attention inner loop:

    m_ij = tl.maximum(m_i, tl.max(qk, 1) * qk_scale)

    qk = qk * qk_scale - m_ij[:, None]

    p = tl.math.exp2(qk)           # NOT tl.exp!

    alpha = tl.math.exp2(m_i - m_ij)  # correction factor also uses exp2


    # Epilogue:

    m_i += tl.math.log2(l_i)       # log2, not log!


    # Backward: pre-scale K by sm_scale * RCP_LN2

    RCP_LN2 = 1.4426950408889634

    arg_k = k * (sm_scale * RCP_LN2)

    # Then exp2 in backward loops too:

    pT = tl.math.exp2(qkT - m[None, :])

    '
  rationale: 'Flash Attention computes softmax(QK^T * scale). The standard approach
    uses

    tl.exp, but on Intel XPU, tl.math.exp2 is faster (it maps to native hardware).


    The trick: multiply the QK scale factor by 1/ln(2) = 1.44269504, then use

    exp2 everywhere (both in the forward online softmax and backward). This is

    algebraically equivalent because exp(x) = exp2(x / ln(2)).


    This extends the exp2 pattern from sigmoid (xpu_sigmoid_use_exp2_not_exp_fp32)

    to the full attention computation.

    '
  stage: xpu_specific
