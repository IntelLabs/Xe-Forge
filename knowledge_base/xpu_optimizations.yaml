  description: Use device max_work_group_size to compute how many rows fit per program
  expected_speedup: significant for narrow rows where single-row programs underutilize
  id: xpu_work_group_size_query
  name: Query max_work_group_size for multi-row tiling in row-wise kernels
  notes: '- BLOCK_SIZE_X must be power-of-2 and >= n_cols (use triton.next_power_of_2)

    - BLOCK_SIZE_Y = 1 is the fallback when rows are wide enough to fill the work
    group

    - Grid shrinks by BLOCK_SIZE_Y (fewer programs, more rows each)

    - This is complementary to xpu_hardware_subslice_query (which queries Xe core
    count)

    '
  pattern_after: 'from triton.runtime import driver


    device = torch.xpu.current_device()

    properties = driver.active.utils.get_device_properties(device)

    MAX_WORK_GROUP_SIZE = properties["max_work_group_size"]


    BLOCK_SIZE_X = triton.next_power_of_2(n_cols)

    BLOCK_SIZE_Y = MAX_WORK_GROUP_SIZE // BLOCK_SIZE_X

    BLOCK_SIZE_Y = BLOCK_SIZE_Y if BLOCK_SIZE_Y > 0 else 1


    grid = (n_rows // BLOCK_SIZE_Y,)

    softmax_kernel[grid](..., BLOCK_SIZE_X=BLOCK_SIZE_X, BLOCK_SIZE_Y=BLOCK_SIZE_Y)

    '
  rationale: 'Row-wise kernels (softmax, layernorm, RMS norm) that fit one row per
    block

    can underutilize the hardware when rows are narrow. Packing multiple rows

    per program (BLOCK_SIZE_Y > 1) increases work per program and utilization.


    The maximum rows per program is bounded by the hardware work group size

    divided by the column block size. Query this at runtime — do not hard-code.

    '
  stage: xpu_specific
