- description: "On Intel XPU, using fp32 `tl.exp()` in the sigmoid epilogue can be\
    \ a throughput bottleneck.\nPrefer an exp2-based formulation:\n  exp(x) = exp2(x\
    \ / ln(2))\nso:\n  sigmoid(x) = 1 / (1 + exp(-x))\n             = 1 / (1 + exp2((-x)\
    \ / ln(2)))\n\nWRONG (often slower on XPU):\n```python\n# acc is fp32\nsig = 1.0\
    \ / (1.0 + tl.exp(-acc))\nout = acc + 2.0 * sig\n```\n\nCORRECT (typically faster\
    \ / broader backend support):\n```python\n@triton.jit\ndef sigmoid_exp2_fp32(x:\
    \ tl.tensor):\n    inv_ln2 = 1.4426950408889634  # 1 / ln(2)\n    e = tl.math.exp2((-x)\
    \ * inv_ln2)\n    return 1.0 / (1.0 + e)\n\nsig = sigmoid_exp2_fp32(acc)\nout\
    \ = acc + 2.0 * sig\n```\n\nNotes:\n- Keep `acc` in fp32 if you need accuracy;\
    \ this rule is about the exp implementation.\n- If your workload tolerates lower\
    \ precision, consider computing sigmoid in fp16/bf16,\n  but only if correctness\
    \ thresholds allow it.\n"
  id: xpu_sigmoid_use_exp2_not_exp_fp32
  name: 'Sigmoid: avoid fp32 tl.exp; prefer tl.math.exp2-based sigmoid (XPU fast-path)'
  severity: high
  stage: xpu_specific
- description: "On Intel XPU, hard-coding `num_warps=32` frequently hurts performance\
    \ due to\nhigher GRF usage and reduced occupancy—especially when the kernel has\
    \ a heavy\nepilogue (sigmoid/bn/lse) or large tiles.\n\nWRONG (common regression\
    \ pattern):\n```python\n@triton.autotune(\n  configs=[triton.Config({'BLOCK_M':\
    \ 256, 'BLOCK_N': 256, 'BLOCK_K': 64, 'grf_mode': '256'},\n                  \
    \       num_warps=32, num_stages=4)],\n  key=['M','N','K'],\n)\n```\nor:\n```python\n\
    # \"XPU guidance says 32 warps\" applied unconditionally\nnum_warps = 32\n```\n\
    \nCORRECT (treat warps as a tuned parameter):\n```python\ncfgs = [\n  triton.Config({'BLOCK_M':\
    \ 128, 'BLOCK_N': 256, 'BLOCK_K': 64, 'grf_mode': '256'}, num_warps=8,  num_stages=4),\n\
    \  triton.Config({'BLOCK_M': 128, 'BLOCK_N': 256, 'BLOCK_K': 64, 'grf_mode': '256'},\
    \ num_warps=16, num_stages=3),\n  # 32 only if it actually wins in autotune:\n\
    \  triton.Config({'BLOCK_M': 256, 'BLOCK_N': 256, 'BLOCK_K': 64, 'grf_mode': '256'},\
    \ num_warps=32, num_stages=3),\n]\n@triton.autotune(configs=cfgs, key=['M','N','K'])\n\
    @triton.jit\ndef kernel(..., BLOCK_M: tl.constexpr, BLOCK_N: tl.constexpr, BLOCK_K:\
    \ tl.constexpr):\n    ...\n```\n\nPractical guidance:\n- If epilogue is heavy\
    \ (sigmoid/bn/lse): start with 8 or 16 warps.\n- If the kernel is pure GEMM and\
    \ tiles are large: 16 may win; 32 is \"maybe\", not default.\n- Always sweep GRF\
    \ mode together with warps if you see register pressure.\n\nException for large\
    \ pure GEMMs:\nFor large, square GEMMs (e.g., 3072x4096x3072) with 256x256 tiles,\n\
    32 warps + grf_mode='256' is a proven strong default — Intel's own XPU\nbenchmark\
    \ kernels ship with this as a single config. The \"don't blindly\nuse 32\" guidance\
    \ is most critical for skinny/non-square shapes and\nkernels with heavy epilogues.\n"
  id: xpu_warp_sweep_no_fixed_32
  name: 'Warp count: do NOT force 32 warps; sweep 4/8/16 (32 only if autotune proves
    it)'
  severity: high
  stage: xpu_specific
