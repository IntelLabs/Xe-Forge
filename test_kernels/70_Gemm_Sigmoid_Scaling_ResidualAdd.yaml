inputs:
  X:
    shape: [BATCH, INPUT_SIZE]
    dtype: float16

inits:
  - dim: INPUT_SIZE
  - dim: HIDDEN_SIZE
  - dim: SCALING_FACTOR

ci:
  - params: [X]
    dtype: float16
    dims:
      BATCH: 4
      INPUT_SIZE: 1024
      HIDDEN_SIZE: 2048
      SCALING_FACTOR: 2.0
    flop: "2*BATCH*HIDDEN_SIZE*INPUT_SIZE"

bench-gpu:
  - params: [X]
    dtype: float16
    dims:
      BATCH: 1024
      INPUT_SIZE: 8192
      HIDDEN_SIZE: 8192
      SCALING_FACTOR: 2.0
    flop: "2*BATCH*HIDDEN_SIZE*INPUT_SIZE"
