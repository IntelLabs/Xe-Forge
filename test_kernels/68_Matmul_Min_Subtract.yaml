inputs:
  X:
    shape: [BATCH, IN_FEAT]
    dtype: float16

inits:
  - dim: IN_FEAT
  - dim: OUT_FEAT
  - dim: CONSTANT

ci:
  - params: [X]
    dtype: float16
    dims:
      BATCH: 128
      IN_FEAT: 16384
      OUT_FEAT: 16384
      CONSTANT: 2.0
    flop: "2*BATCH*OUT_FEAT*IN_FEAT"

bench-gpu:
  - params: [X]
    dtype: float16
    dims:
      BATCH: 128
      IN_FEAT: 16384
      OUT_FEAT: 16384
      CONSTANT: 2.0
    flop: "2*BATCH*OUT_FEAT*IN_FEAT"
