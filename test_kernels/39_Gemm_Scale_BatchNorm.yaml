inputs:
  X:
    shape: [BATCH, IN_FEAT]
    dtype: float16

inits:
  - dim: IN_FEAT
  - dim: OUT_FEAT
  - dim: SCALE_SHAPE

ci:
  - params: [X]
    dtype: float16
    dims:
      BATCH: 16384
      IN_FEAT: 4096
      OUT_FEAT: 4096
      SCALE_SHAPE: [4096]
    flop: "2*BATCH*OUT_FEAT*IN_FEAT"

bench-gpu:
  - params: [X]
    dtype: float16
    dims:
      BATCH: 16384
      IN_FEAT: 4096
      OUT_FEAT: 4096
      SCALE_SHAPE: [4096]
    flop: "2*BATCH*OUT_FEAT*IN_FEAT"
